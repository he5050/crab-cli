name: Security Scan

on:
  workflow_call:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # 每周一凌晨运行
    - cron: "0 0 * * 1"

jobs:
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run dependency audit
        run: bun run audit:check

      - name: Run dependency check
        run: |
          if command -v bunx &> /dev/null; then
            bunx secvisogram
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            audit-results.json
            *.audit
          retention-days: 30

  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "misconfig,secret"
          format: "json"
          output: "trivy-iac-results.json"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Check for secrets
        run: |
          echo "=== Checking for potential secrets ==="
          if grep -r -E "(api[_-]?key|secret[_-]?key|token|password|private[_-]?key)\s*=\s*['\"][a-zA-Z0-9]{20,}['\"]" --include="*.ts" --include="*.js" --include="*.json" .; then
            echo "Potential hardcoded secret found."
            exit 1
          fi

      - name: Upload IaC results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-results
          path: "trivy-iac-results.json"
          retention-days: 30

  sast-scan:
    name: SAST Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "typescript"
          queries: +security-and-quality

      - name: Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"

  container-security:
    name: Container Security
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        if: steps.check_dockerfile.outputs.dockerfile_exists == 'true'
        run: |
          docker build -t crab-cli:${{ github.sha }} .

      - name: Run Trivy container scan
        if: steps.check_dockerfile.outputs.dockerfile_exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "crab-cli:${{ github.sha }}"
          format: "sarif"
          output: "container-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload container scan results
        if: steps.check_dockerfile.outputs.dockerfile_exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "container-results.sarif"

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-check, code-security, sast-scan]
    if: always()
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate summary
        run: |
          echo "=== Security Scan Summary ==="
          echo ""
          echo "Scan completed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo ""
          echo "All security scans have been completed."
          echo "Please review the artifacts for detailed findings."

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: "**/security-report.md"
          retention-days: 90
