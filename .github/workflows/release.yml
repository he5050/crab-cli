name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for example: v0.1.0)"
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write
  security-events: write

jobs:
  security-scan:
    name: Full Security Scan
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      security-events: write

  build:
    name: Build ${{ matrix.target }}
    needs: security-scan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
          - runner: macos-13
            target: darwin-x64
          - runner: ubuntu-22.04
            target: linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run test:typecheck

      - name: Run isolated tests
        run: bun run test:isolated

      - name: Security check
        run: bun run security:check

      - name: Benchmark
        run: bun run benchmark

      - name: Build release target
        run: |
          bun run scripts/release/build-target.ts "${{ matrix.target }}"
          bun run scripts/release/package-release.ts
          bun run scripts/release/checksums.ts
          bun run scripts/release/verify-release.ts "${{ matrix.target }}"

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            release/*.tar.gz
            release/*-checksums.txt
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    env:
      TAG_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: release-*
          merge-multiple: true

      - name: Generate combined checksums
        run: bun run scripts/release/checksums.ts release/*.tar.gz

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/* --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$TAG_NAME" --title "crab-cli $TAG_NAME" --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG_NAME" release/* \
              --title "crab-cli $TAG_NAME" \
              --generate-notes \
              --target "$GITHUB_SHA" \
              --repo "$GITHUB_REPOSITORY"
          fi
